spring.application.name=SklepWedkarski

spring.datasource.url=jdbc:mysql://localhost:3307/mydatabase?serverTimezone=UTC
spring.datasource.username= myuser
spring.datasource.password= secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
spring.server.servlet.encoding.charset=UTF-8
spring.server.servlet.encoding.force=true
spring.sql.init.encoding=UTF-8

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.session.jdbc.initialize-schema=always
